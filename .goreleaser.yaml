version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: roost
    main: ./cmd/roost
    binary: roost
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version=v{{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

brews:
  - name: roost
    repository:
      owner: Thomaspeel6
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/Thomaspeel6/roost"
    description: "Recap any past Claude Code session in 50ms"
    license: "MIT"
    install: |
      bin.install "roost"
    test: |
      system "#{bin}/roost", "version"

release:
  prerelease: auto
  draft: false
